name: axle_tracking_cms
description: Axle Tracking CMS mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  google_maps_flutter: ^2.12.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  video_player: ^2.9.5
  webview_flutter: ^4.0.0
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/images/
